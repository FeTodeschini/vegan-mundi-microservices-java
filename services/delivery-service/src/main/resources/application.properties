# Delivery Service Configuration
server.port=8005
spring.application.name=delivery-service

# Database
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/vegan-mundi?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_SECRET}
spring.datasource.hikari.maximum-pool-size=10

spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=false

# JWT
jwt.secret=${JWT_SECRET_KEY}

# Logging
logging.level.root=INFO
logging.level.com.veganmundi=DEBUG
