# API Gateway Configuration
# Runs on port 4000 — same port as the Node.js server.
# To switch the frontend from Node.js to Java:
#   1. Stop the Node.js server (npm run dev in server/)
#   2. Start all Java services (ports 8001-8007)
#   3. Start this gateway
# No frontend config change is needed — it still hits http://localhost:4000/

server.port=4000
spring.application.name=gateway

# ── Routes ──────────────────────────────────────────────────────────────────
spring.cloud.gateway.routes[0].id=account-service
spring.cloud.gateway.routes[0].uri=http://localhost:8001
spring.cloud.gateway.routes[0].predicates[0]=Path=/account/**

spring.cloud.gateway.routes[1].id=class-service
spring.cloud.gateway.routes[1].uri=http://localhost:8002
spring.cloud.gateway.routes[1].predicates[0]=Path=/classes/**

spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=http://localhost:8003
spring.cloud.gateway.routes[2].predicates[0]=Path=/order/**

spring.cloud.gateway.routes[3].id=review-service
spring.cloud.gateway.routes[3].uri=http://localhost:8004
spring.cloud.gateway.routes[3].predicates[0]=Path=/review/**

spring.cloud.gateway.routes[4].id=delivery-service
spring.cloud.gateway.routes[4].uri=http://localhost:8005
spring.cloud.gateway.routes[4].predicates[0]=Path=/delivery-methods/**

spring.cloud.gateway.routes[5].id=gallery-service
spring.cloud.gateway.routes[5].uri=http://localhost:8006
spring.cloud.gateway.routes[5].predicates[0]=Path=/gallery/**

spring.cloud.gateway.routes[6].id=price-service
spring.cloud.gateway.routes[6].uri=http://localhost:8007
spring.cloud.gateway.routes[6].predicates[0]=Path=/prices/**

# ── Global CORS (lets the Next.js frontend on port 3000 reach the gateway) ──
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=false
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Access-Control-Allow-Methods Access-Control-Allow-Headers, RETAIN_FIRST

# Logging
logging.level.root=INFO
logging.level.org.springframework.cloud.gateway=DEBUG
