services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    image: vegan-mundi-jenkins:latest
    container_name: vegan-mundi-jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      CASC_JENKINS_CONFIG: /var/jenkins_home/casc_configs/jenkins.yaml
      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_ID}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD}
      JENKINS_PIPELINE_NAME: ${JENKINS_PIPELINE_NAME}
      JENKINS_REPO_URL: ${JENKINS_REPO_URL}
      JENKINS_REPO_BRANCH: ${JENKINS_REPO_BRANCH}
      JENKINS_JENKINSFILE_PATH: ${JENKINS_JENKINSFILE_PATH}
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false -Xms256m -Xmx768m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Djava.awt.headless=true
      MAVEN_OPTS: -Xms128m -Xmx512m -XX:+UseG1GC
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./casc:/var/jenkins_home/casc_configs:ro

volumes:
  jenkins_home:
